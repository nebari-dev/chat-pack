name: docker

on:
  pull_request:
  push:
    tags: ['v[0-9]+\.[0-9]+\.[0-9]+']

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: ${{ github.event_name != 'pull_request' }}
      matrix:
        include:
          - image: quay.io/nebari/nebari-chat-backend
            context: ./backend
          - image: quay.io/nebari/nebari-chat-frontend
            context: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Compute versions
        id: versions
        uses: ./.github/actions/compute-versions

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Setup image metadata
        id: image
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.versions.outputs.app-version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.github.event.name=${{ github.event_name }}
            io.github.event.pull-request.number=${{ github.event.number }}

      - name: Login to Quay.io
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          build-args: |
            VERSION=${{ steps.versions.outputs.app-version }}
          platforms: "linux/amd64,linux/arm64"
          tags: ${{ needs.metadata.outputs.tags }}
          labels: ${{ needs.metadata.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
