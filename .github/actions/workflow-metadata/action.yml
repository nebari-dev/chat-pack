name: workflow-metadata
description: "Compute workflow metadata"

outputs:
  workflow-type:
    description: Workflow type. One of 'PR', 'main', or 'release'
    value: ${{ steps.workflow.outputs.workflow-type }}
  app-version-json:
    description: App version info as JSON
    value: ${{ steps.versions.outputs.app-version-json }}
  chart-version-json:
    description: Chart version info as JSON
    value: ${{ steps.versions.outputs.chart-version-json }}
  tags-json:
    description: Tag selection as JSON (stable-tag + additional-tags)
    value: ${{ steps.tags.outputs.tags-json }}

runs:
  using: composite

  steps:
    - id: workflow
      shell: bash
      run: |
        # Compute workflow type
        case '${{ github.event_name }}' in
          pull_request)
            WORKFLOW_TYPE=PR
            ;;
          push)
            case '${{ github.ref }}' in
              refs/heads/main)
                WORKFLOW_TYPE=main
                ;;
              refs/tags/*)
                WORKFLOW_TYPE=release
                ;;
              *)
              echo "unknown push ref '${{ github.ref }}'" >&2
              exit 1
              ;;
            esac
            ;;
          *)
            echo "unknown event name '${{ github.event_name }}'" >&2
            exit 1
            ;;
        esac

        echo "workflow-type=${WORKFLOW_TYPE}" | tee --append "${GITHUB_OUTPUT}"

    - name: Install uv and set the python version
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        working-directory: ./backend
        enable-cache: true

    - shell: bash
      working-directory: ./backend
      run: uv sync --link-mode copy --locked

    - id: versions
      shell: bash
      working-directory: ./backend
      run: |
        APP_VERSION_JSON=$(uv run python .github/actions/workflow-metadata/version_script.py --root . --pattern-prefix "")
        echo "app-version-json=${APP_VERSION_JSON}" | tee --append "${GITHUB_OUTPUT}"

        CHART_VERSION_JSON=$(uv run python .github/actions/workflow-metadata/version_script.py --root . --pattern-prefix "chart/")
        echo "chart-version-json=${CHART_VERSION_JSON}" | tee --append "${GITHUB_OUTPUT}"

    - id: tags
      shell: bash
      run: |
        APP_BASE=$(echo '${{ steps.versions.outputs.app-version-json }}' | jq --raw-output '.base')
        SHA=$(echo '${{ steps.versions.outputs.app-version-json }}' | jq --raw-output '.commit')

        case '${{ steps.workflow.outputs.workflow-type }}' in
          PR)
            PR_NUMBER='${{ github.event.number }}'
            STABLE_TAG="${APP_BASE}-pr.${PR_NUMBER}.${SHA}"
            ADDITIONAL_TAGS="[\"${APP_BASE}-pr.${PR_NUMBER}\"]"
            ;;
          main)
            STABLE_TAG="${APP_BASE}-main"
            ADDITIONAL_TAGS="[]"
            ;;
          release)
            STABLE_TAG="${APP_BASE}"
            ADDITIONAL_TAGS="[]"
            ;;
          *)
            echo "unknown workflow type '${{ steps.workflow.outputs.workflow-type }}'" >&2
            exit 1
            ;;
        esac

        TAGS_JSON=$(jq --null-input --compact-output \
          --arg stable "${STABLE_TAG}" \
          --argjson additional "${ADDITIONAL_TAGS}" \
          '{"stable-tag": $stable, "additional-tags": $additional}' \
        )
        echo "tags-json=${TAGS_JSON}" | tee --append "${GITHUB_OUTPUT}"
