{{- if .Values.frontend.enabled }}
{{- $component := "frontend" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ravnar.component-name" (dict "top" . "component" $component) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ravnar.labels" (dict "top" . "component" $component) | nindent 4 }}
data:
  {{- $branding := .Values.frontend.branding | default dict }}
  {{- $theme := $branding.theme | default dict }}
  # Served by nginx at /config.json. The frontend fetches this file at startup,
  # so Keycloak connection settings and branding can be changed without
  # rebuilding the image. Empty branding fields fall back to built-in defaults.
  config.json: |
    {{-
    dict
      "keycloak" (dict
        "url" (required "keycloak.url is required" .Values.keycloak.url)
        "realm" (required "keycloak.realm is required" .Values.keycloak.realm)
        "clientId" (.Values.keycloak.clientId | default (printf "%s-%s-spa" .Release.Namespace (include "ravnar.component-name" (dict "top" . "component" $component))))
      )
      "branding" (dict
        "title" ($branding.title | default "")
        "logoUrl" ($branding.logoUrl | default "")
        "logoUrlDark" ($branding.logoUrlDark | default "")
        "faviconUrl" ($branding.faviconUrl | default "")
        "theme" (dict
          "light" ($theme.light | default dict)
          "dark" ($theme.dark | default dict)
        )
      )
    | toPrettyJson | nindent 4
    }}
  {{- with include "nebari-chat.ravnarContextJson" . | fromJson }}
  API_URL: {{ $.Values.frontend.api.url | default (printf "http://%s.%s.svc.cluster.local:%d" (include "ravnar.fullname" .) $.Release.Namespace (.Values.service.port | default 80 | int)) | quote }}
  {{- end }}
{{- end }}
